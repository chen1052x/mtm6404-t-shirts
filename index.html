<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Shirt Store</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
    .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .card img { width: 100%; height: auto; border-radius: 4px; margin-bottom: 10px; }
    .price { font-weight: bold; font-size: 1.2em; }
    .out-of-stock { color: red; font-weight: bold; }
    button { padding: 5px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const initialTshirts = [
      { title: 'Blue T-Shirt', image: 'blue-t-shirt.jpg', price: 7.99, stock: 4 },
      { title: 'Bright Purple T-Shirt', image: 'bright-purple-t-shirt.jpg', price: 5.99, stock: 1 },
      { title: 'Cobalt Blue T-Shirt', image: 'cobalt-blue-t-shirt.jpg', price: 9.99, stock: 5 },
      { title: 'Green T-Shirt', image: 'green-t-shirt.jpg', price: 6.99, stock: 0 },
      { title: 'Grey T-Shirt', image: 'grey-t-shirt.jpg', price: 4.99, stock: 2 },
      { title: 'Light Green T-Shirt', image: 'light-green-t-shirt.jpg', price: 7.99, stock: 4 },
      { title: 'Purple T-Shirt', image: 'purple-t-shirt.jpg', price: 7.99, stock: 0 },
      { title: 'Red T-Shirt', image: 'red-t-shirt.jpg', price: 6.99, stock: 3 },
      { title: 'Teal T-Shirt', image: 'teal-t-shirt.jpg', price: 7.99, stock: 2 }
    ];

    const { useState } = React;

    function App() {
      const [inventory, setInventory] = useState(initialTshirts);

      const handleBuy = (index) => {
        const qty = parseInt(document.getElementById(`select-${index}`).value);
        const nextInventory = [...inventory];
        nextInventory[index].stock -= qty;
        setInventory(nextInventory);
      };

      return (
        <div>
          <h1>T-Shirt Store</h1>
          <div className="store-grid">
            {inventory.map((tshirt, index) => (
              <div key={index} className="card">
                <img src={tshirt.image} alt={tshirt.title} />
                <h2>{tshirt.title}</h2>
                <p className="price">${tshirt.price}</p>
                
                {tshirt.stock > 0 ? (
                  <div>
                    <p>Remaining Stock: {tshirt.stock}</p>
                    <select id={`select-${index}`}>
                      {[...Array(tshirt.stock).keys()].map(n => (
                        <option key={n + 1} value={n + 1}>{n + 1}</option>
                      ))}
                    </select>
                    <button onClick={() => handleBuy(index)}>Buy</button>
                  </div>
                ) : (
                  <p className="out-of-stock">Out of Stock</p>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
